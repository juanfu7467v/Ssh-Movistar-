app = "sh-movistar"
primary_region = "mia"

[build]
  dockerfile = "Dockerfile"

[env]
  SSH_PORT = "2222"
  WS_PORT = "8080"

[deploy]
  strategy = "immediate"

[http_service]
  internal_port = 8080
  force_https = false
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.ports]]
    handlers = ["http"]
    port = 80

  [[http_service.ports]]
    handlers = ["tls", "http"]
    port = 443
