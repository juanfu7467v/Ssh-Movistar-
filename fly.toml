# fly.toml app configuration file generated for sh-movistar
# Configuración multi-puerto para entorno de laboratorio SSH

app = 'sh-movistar'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

# Mapeo Puerto 22 (SSH Directo)
[[services]]
  internal_port = 22
  protocol = "tcp"
  [[services.ports]]
    port = 22

# Mapeo Puerto 90 (Dropbear)
[[services]]
  internal_port = 90
  protocol = "tcp"
  [[services.ports]]
    port = 90

# Mapeo Puerto 80 (WS HTTP)
[[services]]
  internal_port = 80
  protocol = "tcp"
  [[services.ports]]
    port = 80

# Mapeo Puerto 443 (WSS / TLS)
[[services]]
  internal_port = 443
  protocol = "tcp"
  [[services.ports]]
    port = 443

# Mapeo Puerto 8080 (WS CDN)
[[services]]
  internal_port = 8080
  protocol = "tcp"
  [[services.ports]]
    port = 8080

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
