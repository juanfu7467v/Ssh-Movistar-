# fly.toml app configuration file generated for sh-movistar on 2026-07-05T12:07:42Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'sh-movistar'
primary_region = 'dfw'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  strategy = 'immediate'

[env]
  SSH_PORT = '2222'
  WS_PORT = '8080'

[http_service]
  internal_port = 8080
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
